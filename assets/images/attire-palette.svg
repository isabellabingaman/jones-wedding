<svg width="100%" viewBox="0 0 680 130" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Wedding attire color palette</title>
  <desc>Six equal muted color swatches in a single tight row with color names and hex codes below each.</desc>

  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jost:wght@300;400&display=swap');
      .label-name { font-family: 'Jost', sans-serif; font-weight: 400; font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; fill: #3a3530; }
      .label-hex  { font-family: 'Jost', sans-serif; font-weight: 300; font-size: 9px; letter-spacing: 0.06em; fill: #3a3530; opacity: 0.5; }
    </style>
  </defs>

  <rect x="20"  y="10" width="90" height="70" fill="#B8C9B0"/>
  <text x="20"  y="92"  class="label-name">Dusty sage</text>
  <text x="20"  y="104" class="label-hex">#B8C9B0</text>

  <rect x="125" y="10" width="90" height="70" fill="#8FAEC8"/>
  <text x="125" y="92"  class="label-name">Slate blue</text>
  <text x="125" y="104" class="label-hex">#8FAEC8</text>

  <rect x="230" y="10" width="90" height="70" fill="#B8A8CC"/>
  <text x="230" y="92"  class="label-name">Muted lavender</text>
  <text x="230" y="104" class="label-hex">#B8A8CC</text>

  <rect x="335" y="10" width="90" height="70" fill="#E0CC8C"/>
  <text x="335" y="92"  class="label-name">Butter yellow</text>
  <text x="335" y="104" class="label-hex">#E0CC8C</text>

  <rect x="440" y="10" width="90" height="70" fill="#D4A0A8"/>
  <text x="440" y="92"  class="label-name">Antique rose</text>
  <text x="440" y="104" class="label-hex">#D4A0A8</text>

  <rect x="545" y="10" width="90" height="70" fill="#D8CCBA"/>
  <text x="545" y="92"  class="label-name">Linen</text>
  <text x="545" y="104" class="label-hex">#D8CCBA</text>

</svg>
