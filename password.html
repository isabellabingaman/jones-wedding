<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krista & Noah — January 16, 2027</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:ital,wght@0,300;0,400;1,300;1,400&family=Pinyon+Script&family=Petit+Formal+Script&family=Jost:wght@300;400&family=Cormorant+SC:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Tokens ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


    @font-face {
      font-family: 'Abrama Serif';
      src: url('assets/fonts/AbramaSerif-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    } 
    
    :root {
      --cream:   #fdf9f5;
      --white:   #ffffff;
      --navy:    #3b1f2b;
      --blue:    #7a3b3b;
      --blue-lt: #a05c4a;
      --lilac:   #8b3a52;
      --blush:   #c47a5a;
      --sage:    #6b7c41;
      --yellow:  #d4845a;
      --gold:    #b85c38;
      --black:   #000000;

      --font-script: 'Abrama Serif', serif;
      --font-serif:  'Cormorant Upright', serif;
      --font-sans:   'Jost', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--navy);
      font-family: var(--font-sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Background pattern ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('assets/images/BGDesign1.jpg');
      background-repeat: repeat;
      background-size: 400px;
      opacity: 0.10;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Gate section — mirrors .hero ────────────────────────────────── */
    .gate {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      z-index: 1;
    }

    /* Decorative top border — identical to .hero::before */
    .gate::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg,
        var(--lilac), var(--blue), var(--blush), var(--yellow), var(--blue-lt), var(--sage), var(--lilac));
    }

    /* ── Eyebrow ─────────────────────────────────────────────────────── */
    .eyebrow {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    /* ── Names ───────────────────────────────────────────────────────── */
    .names {
      font-family: var(--font-script);
      font-size: clamp(4.5rem, 12vw, 9rem);
      line-height: 1.05;
      color: var(--navy);
      opacity: 0;
      animation: fadeUp 1s 0.4s forwards;
    }

    .names .ampersand {
      display: block;
      font-size: 0.55em;
      color: var(--navy);
      line-height: 1.2;
    }

    /* ── Date & venue ────────────────────────────────────────────────── */
    .date-line {
      font-family: 'Petit Formal Script', cursive;
      font-size: clamp(0.95rem, 2.2vw, 1.25rem);
      letter-spacing: 0.12em;
      color: var(--navy);
      font-style: normal;
      opacity: 0;
      animation: fadeUp 0.8s 0.9s forwards;
    }

    .venue-line {
      font-family: 'Petit Formal Script', cursive;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      color: var(--blue);
      margin-top: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 1.05s forwards;
    }

    /* ── Password form ───────────────────────────────────────────────── */
    .password-wrap {
      margin-top: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 1.2s forwards;
      width: 100%;
      max-width: 320px;
    }

    .input-label {
      font-family: var(--font-sans);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--navy);
      opacity: 0.5;
      display: block;
      margin-bottom: 0.8rem;
    }

    .password-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.25);
      padding: 0.6rem 0;
      font-family: 'Petit Formal Script', cursive;
      font-size: 1.1rem;
      color: var(--navy);
      text-align: center;
      outline: none;
      letter-spacing: 0.08em;
      transition: border-color 0.2s;
      margin-bottom: 1.8rem;
      display: block;
    }

    .password-input:focus {
      border-bottom-color: var(--navy);
    }

    .password-input::placeholder {
      opacity: 0.3;
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }

    /* ── Enter button — mirrors .btn-rsvp ────────────────────────────── */
    .btn-enter {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--white);
      background: var(--navy);
      padding: 0.9rem 2.8rem;
      border: 1px solid var(--navy);
      transition: background 0.25s, color 0.25s;
      cursor: pointer;
      width: 100%;
    }

    .btn-enter:hover {
      background: transparent;
      color: var(--navy);
    }

    /* ── Error message ───────────────────────────────────────────────── */
    .error-msg {
      font-family: 'Petit Formal Script', cursive;
      font-size: 0.85rem;
      color: var(--navy);
      opacity: 0;
      margin-top: 1rem;
      transition: opacity 0.3s;
      min-height: 1.2em;
    }

    .error-msg.visible {
      opacity: 0.55;
    }

    /* ── Animations ──────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }

    .shake {
      animation: shake 0.4s ease;
    }

    /* ── Responsive ──────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .names { font-size: clamp(4rem, 18vw, 6rem); }
    }
  </style>
</head>
<body>

  <section class="gate">

    <p class="eyebrow">Your attendance is requested at the wedding of</p>

    <h1 class="names">
      Krista
      <span class="ampersand">&</span>
      Noah
    </h1>

    <p class="date-line">Saturday, the Twenty-Seventh of January, Two Thousand Twenty-Seven</p>
    <p class="venue-line">Temecula, California</p>

    <!-- Password form -->
    <div class="password-wrap">
      <label class="input-label" for="password-field">Enter the password from your invitation</label>
      <input
        id="password-field"
        class="password-input"
        type="password"
        placeholder="password"
        autocomplete="off"
        autofocus
      />
      <button class="btn-enter" onclick="checkPassword()">Enter</button>
      <p class="error-msg" id="error-msg">Incorrect password — please try again.</p>
    </div>

  </section>

  <script>
    // ── Set your password here ─────────────────────────────────────────
    const WEDDING_PASSWORD = 'jones27';
    // ──────────────────────────────────────────────────────────────────

    document.getElementById('password-field').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      const input = document.getElementById('password-field').value.trim().toLowerCase();
      const errorMsg = document.getElementById('error-msg');

      if (input === WEDDING_PASSWORD.toLowerCase()) {
        sessionStorage.setItem('wedding_auth', 'true');
        window.location.replace('index.html');
      } else {
        errorMsg.classList.add('visible');
        const field = document.getElementById('password-field');
        field.classList.remove('shake');
        void field.offsetWidth;
        field.classList.add('shake');
        field.value = '';
        field.focus();
      }
    }
  </script>

</body>
</html>
