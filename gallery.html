<!DOCTYPE html>
<html lang="en">
<head>
  <script>
  if (!sessionStorage.getItem('wedding_auth')) {

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Krista & Noah</title>

  <!-- Fonts — match existing site exactly -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:ital,wght@0,300;0,400;1,300;1,400&family=Pinyon+Script&family=Petit+Formal+Script&family=Jost:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @font-face {
      font-family: 'Abrama Serif';
      src: url('assets/fonts/AbramaSerif-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --cream:   #fdf9f5;
      --white:   #ffffff;
      --navy:    #3b1f2b;
      --blue:    #7a3b3b;
      --blue-lt: #a05c4a;
      --lilac:   #8b3a52;
      --blush:   #c47a5a;
      --sage:    #6b7c41;
      --yellow:  #d4845a;
      --gold:    #b85c38;
      --black:   #000000;

      --font-script: 'Abrama Serif', serif;
      --font-serif:  'Cormorant Upright', serif;
      --font-sans:   'Jost', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--navy);
      font-family: var(--font-sans);
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Background pattern — identical to other pages */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('assets/images/BGDesign1.jpg');
      background-repeat: repeat;
      background-size: 400px;
      opacity: 0.075;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      gap: 3rem;
      padding: 1.4rem 2rem;
      background: linear-gradient(to bottom, rgba(250,248,244,0.92) 60%, transparent);
      letter-spacing: 0.18em;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 400;
    }

    nav a {
      text-decoration: none;
      color: var(--navy);
      transition: opacity 0.2s;
    }
    nav a:hover { opacity: 0.5; }

    /* ── Page wrapper ── */
    .page {
      position: relative;
      z-index: 1;
      padding-top: 7rem;
      padding-bottom: 6rem;
    }

    /* ── Page header ── */
    .page-header {
      text-align: center;
      margin-bottom: 4rem;
      padding: 0 2rem;
      position: relative;
    }

    /* Decorative top border */
    .page-header::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg,
        var(--lilac), var(--blue), var(--blush), var(--yellow), var(--blue-lt), var(--sage), var(--lilac));
      z-index: 101;
    }

    .eyebrow {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s forwards;
    }

    .page-header h1 {
      font-family: var(--font-script);
      font-size: clamp(3.5rem, 9vw, 6.5rem);
      line-height: 1.1;
      color: var(--navy);
      opacity: 0;
      animation: fadeUp 0.9s 0.4s forwards;
    }

    /* ── Masonry gallery ── */
    .gallery-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    .masonry {
      columns: 3;
      column-gap: 1rem;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.7s forwards;
    }

    /* Stagger each item */
    .masonry-item:nth-child(1)  { animation-delay: 0.3s; }
    .masonry-item:nth-child(2)  { animation-delay: 0.4s; }
    .masonry-item:nth-child(3)  { animation-delay: 0.5s; }
    .masonry-item:nth-child(4)  { animation-delay: 0.55s; }
    .masonry-item:nth-child(5)  { animation-delay: 0.6s; }
    .masonry-item:nth-child(6)  { animation-delay: 0.65s; }
    .masonry-item:nth-child(7)  { animation-delay: 0.7s; }
    .masonry-item:nth-child(8)  { animation-delay: 0.75s; }
    .masonry-item:nth-child(9)  { animation-delay: 0.8s; }
    .masonry-item:nth-child(10) { animation-delay: 0.85s; }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.5s ease, filter 0.4s ease;
      filter: brightness(0.97);
    }

    .masonry-item:hover img {
      transform: scale(1.02);
      filter: brightness(1.03);
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.88);
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      color: rgba(255,255,255,0.7);
      font-family: var(--font-sans);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: white; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--navy);
      opacity: 0.35;
      border-top: 1px solid rgba(0,0,0,0.08);
      position: relative;
      z-index: 1;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .masonry { columns: 2; }
      nav { gap: 1.5rem; font-size: 0.62rem; }
    }

    @media (max-width: 500px) {
      .masonry { columns: 1; }
    }
  </style>
</head>

  <!-- Lightbox -->

    <span class="lightbox-close">Close</span>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <footer>
    Krista Wysolmierski & Noah Jones · January 16, 2027 · Temecula, California

  <script>
    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
